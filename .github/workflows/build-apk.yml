# Build chat-gusogst APK
# 触发：push 到 main（代码变更）或手动触发
name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'capacitor-app/**'
      - 'app/src/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          cd capacitor-app
          npm install

      - name: Build web assets
        run: |
          cd capacitor-app
          npm run build

      - name: Sync Capacitor
        run: |
          cd capacitor-app
          npx cap sync android

      - name: Build debug APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-gusogst-debug
          path: capacitor-app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
