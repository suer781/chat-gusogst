name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native project
        run: npx expo prebuild --platform android --no-install

      - name: Fix reanimated Gradle compatibility
        run: |
          cd android
          # Downgrade Gradle to 8.10.2 for reanimated compatibility
          python3 -c "import pathlib; p=pathlib.Path('gradle/wrapper/gradle-wrapper.properties'); t=p.read_text(); t=t.replace('gradle-8.14.3-bin', 'gradle-8.10.2-bin'); p.write_text(t)"
          echo ndkVersion=26.1.10909125 >> gradle.properties
          echo NODE_BINARY=$(which node) >> gradle.properties
          echo hermesEnabled=true >> gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (Release)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-gusogst-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 14
