# Build chat-gusogst APK
name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'capacitor-app/**'
      - 'app/src/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          cd capacitor-app
          npm install

      - name: Build web assets
        run: |
          cd capacitor-app
          npm run build

      - name: Add Android platform
        run: |
          cd capacitor-app
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ already exists, skipping cap add"
          fi

      - name: Sync Capacitor
        run: |
          cd capacitor-app
          npx cap sync android

      - name: Build debug APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-gusogst-debug
          path: capacitor-app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
