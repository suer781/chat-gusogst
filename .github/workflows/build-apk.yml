name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'capacitor-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Web
        working-directory: capacitor-app
        run: |
          npm install
          npm run build

      - name: Init Capacitor & Add Android
        working-directory: capacitor-app
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK
        working-directory: capacitor-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-gusogst-apk
          path: capacitor-app/android/app/build/outputs/apk/debug/app-debug.apk