name: Build Native Android APK

on:
  push:
    branches: [ AndroidUI ]
    paths:
      - 'android-native/**'
      - '.github/workflows/build-native-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'ndk;27.0.12077973' --sdk_root=$ANDROID_HOME
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Generate Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.11.1
          fi
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-gusogst-native-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
