name: Build Native Android APK

on:
  push:
    branches: [ AndroidUI ]
    paths:
      - 'android-native/**'
      - '.github/workflows/build-native-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' --sdk_root=$ANDROID_HOME
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true

      - name: Setup Python for Chaquopy
        run: |
          mkdir -p /opt/hermes/.venv/bin
          PYTHON_BIN=$(which python3)
          ln -sf "$PYTHON_BIN" /opt/hermes/.venv/bin/python
          ln -sf "$PYTHON_BIN" /opt/hermes/.venv/bin/python3
          /opt/hermes/.venv/bin/python --version
        shell: bash

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        timeout-minutes: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-gusogst-native-debug
          path: android-native/app/build/outputs/apk/debug/*.apk
          retention-days: 30
