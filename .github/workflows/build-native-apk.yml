name: Build Native Android APK

on:
  push:
    branches: [ AndroidUI ]
    paths:
      - 'android-native/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' --sdk_root=$ANDROID_HOME
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true

      - name: Download Gradle wrapper
        run: |
          chmod +x gradlew
          mkdir -p gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -o /tmp/gradle.zip
          # Extract the wrapper jar from the distribution
          unzip -p /tmp/gradle.zip "gradle-8.11.1/lib/gradle-wrapper-*.jar" > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-gusogst-native-debug
          path: android-native/app/build/outputs/apk/debug/*.apk
          retention-days: 30
